<svg viewBox="0 0 100 110" xmlns="http://www.w3.org/2000/svg">
  <!-- Olive branches - left -->
  <path d="M 32 15 Q 22 8 12 3" stroke="#6b8c42" stroke-width="2" fill="none" stroke-linecap="round"/>
  <ellipse cx="28" cy="12" rx="4" ry="7" fill="#6b8c42" transform="rotate(-50 28 12)"/>
  <ellipse cx="22" cy="8" rx="3.5" ry="6" fill="#6b8c42" transform="rotate(-45 22 8)"/>
  <ellipse cx="16" cy="5" rx="3" ry="5" fill="#6b8c42" transform="rotate(-35 16 5)"/>
  
  <!-- Olive fruits left -->
  <circle cx="25" cy="14" r="2.5" fill="#d4a853"/>
  <circle cx="18" cy="9" r="2" fill="#d4a853"/>
  
  <!-- Olive branches - right -->
  <path d="M 68 15 Q 78 8 88 3" stroke="#6b8c42" stroke-width="2" fill="none" stroke-linecap="round"/>
  <ellipse cx="72" cy="12" rx="4" ry="7" fill="#6b8c42" transform="rotate(50 72 12)"/>
  <ellipse cx="78" cy="8" rx="3.5" ry="6" fill="#6b8c42" transform="rotate(45 78 8)"/>
  <ellipse cx="84" cy="5" rx="3" ry="5" fill="#6b8c42" transform="rotate(35 84 5)"/>
  
  <!-- Olive fruits right -->
  <circle cx="75" cy="14" r="2.5" fill="#d4a853"/>
  <circle cx="82" cy="9" r="2" fill="#d4a853"/>
  
  <!-- Central stem -->
  <path d="M 50 12 Q 50 6 50 0" stroke="#6b8c42" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <ellipse cx="47" cy="6" rx="2.5" ry="5" fill="#6b8c42" transform="rotate(-20 47 6)"/>
  <ellipse cx="53" cy="6" rx="2.5" ry="5" fill="#6b8c42" transform="rotate(20 53 6)"/>
  <circle cx="50" cy="9" r="1.5" fill="#d4a853"/>
  
  <!-- Left tower -->
  <polygon points="20,90 32,15 40,90" fill="#1a3d2e"/>
  
  <!-- Right tower -->
  <polygon points="60,90 68,15 80,90" fill="#1a3d2e"/>
  
